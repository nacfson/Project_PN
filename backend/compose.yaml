name: project_pn

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: project_pn_dev
      POSTGRES_USER: project_pn
      POSTGRES_PASSWORD: project_pn_dev_password
    ports:
      - "5433:5432"
    volumes:
      - project_pn_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_pn -d project_pn_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  project_pn_postgres_data:
