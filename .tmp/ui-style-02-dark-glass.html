<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project PN — Dark Glass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;background:#0f111a;}.phone{max-width:390px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#0f111a 0%,#1a1d2e 100%);box-shadow:0 0 80px rgba(99,102,241,0.15);}.glass{background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);}</style>
</head>
<body>
  <div class="phone px-5 pt-12 pb-24 text-white">
    <header class="flex items-center justify-between mb-8">
      <div>
        <p class="text-xs text-indigo-300/70 font-medium">Good evening</p>
        <h1 class="text-2xl font-bold mt-0.5">Alex</h1>
      </div>
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center font-bold text-sm">A</div>
    </header>

    <div class="glass rounded-3xl p-6 mb-6 relative overflow-hidden">
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/30 rounded-full blur-3xl"></div>
      <div class="relative">
        <p class="text-indigo-200/80 text-sm">Due today</p>
        <p class="text-5xl font-extrabold mt-1">12</p>
        <div class="flex gap-3 mt-6">
          <button class="flex-1 bg-white text-indigo-900 font-bold py-3.5 rounded-2xl shadow-lg shadow-indigo-500/20">Start</button>
          <button class="px-5 py-3.5 rounded-2xl glass text-white font-semibold">Preview</button>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="glass rounded-3xl p-4">
        <p class="text-xs text-indigo-200/60 uppercase tracking-wider">Streak</p>
        <p class="text-3xl font-bold mt-1">24 🔥</p>
      </div>
      <div class="glass rounded-3xl p-4">
        <p class="text-xs text-indigo-200/60 uppercase tracking-wider">XP today</p>
        <p class="text-3xl font-bold mt-1">130</p>
      </div>
    </div>

    <div class="glass rounded-3xl p-5 mb-6">
      <p class="text-xs text-indigo-200/60 uppercase tracking-wider mb-3">Word of the day</p>
      <p class="text-2xl font-bold">serendipity</p>
      <p class="text-sm text-indigo-200/70 mt-1">finding something good without looking for it</p>
    </div>

    <div class="glass rounded-3xl p-5">
      <p class="text-xs text-indigo-200/60 uppercase tracking-wider mb-3">Mastery</p>
      <div class="flex h-3 rounded-full overflow-hidden gap-0.5">
        <div class="bg-indigo-900" style="width:12%"></div>
        <div class="bg-indigo-700" style="width:18%"></div>
        <div class="bg-indigo-500" style="width:22%"></div>
        <div class="bg-purple-500" style="width:20%"></div>
        <div class="bg-pink-500" style="width:18%"></div>
        <div class="bg-amber-400" style="width:10%"></div>
      </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 glass px-6 py-4 flex justify-between text-xs" style="max-width:390px;margin:0 auto;border-radius:24px 24px 0 0;border-bottom:none;">
      <span class="text-white font-bold">Learn</span>
      <span class="text-indigo-200/50">Words</span>
      <span class="text-indigo-200/50">Add</span>
      <span class="text-indigo-200/50">Practice</span>
      <span class="text-indigo-200/50">Settings</span>
    </nav>
  </div>
</body>
</html>
