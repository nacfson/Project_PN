<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project PN — Warm Playful</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Nunito',sans-serif;background:#fff7ed;}.phone{max-width:390px;margin:0 auto;min-height:100vh;background:#fff7ed;box-shadow:0 0 60px rgba(249,115,22,0.1);}.blob{background:#fed7aa;}</style>
</head>
<body>
  <div class="phone px-5 pt-12 pb-24">
    <header class="flex items-center justify-between mb-6">
      <div>
        <p class="text-amber-700/70 font-bold text-sm">Hello!</p>
        <h1 class="text-2xl font-extrabold text-amber-950">Alex 🌟</h1>
      </div>
      <div class="w-12 h-12 rounded-2xl bg-amber-200 flex items-center justify-center text-2xl">🦉</div>
    </header>

    <div class="bg-orange-400 rounded-[32px] p-6 text-white shadow-xl shadow-orange-200 mb-6 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-32 h-32 bg-orange-300 rounded-full -mr-8 -mt-8 opacity-50"></div>
      <div class="relative">
        <p class="font-bold text-orange-100">12 words waiting for you</p>
        <p class="text-4xl font-extrabold mt-1">Ready to play?</p>
        <button class="mt-5 bg-white text-orange-600 font-extrabold py-3 px-8 rounded-2xl shadow-lg">Start reviewing 🚀</button>
      </div>
    </div>

    <div class="flex gap-4 mb-6 overflow-x-auto pb-2">
      <div class="bg-white rounded-3xl p-4 min-w-[120px] shadow-md text-center">
        <p class="text-3xl">🔥</p>
        <p class="text-xl font-extrabold text-amber-900 mt-1">24</p>
        <p class="text-xs text-amber-700/60 font-bold">day streak</p>
      </div>
      <div class="bg-white rounded-3xl p-4 min-w-[120px] shadow-md text-center">
        <p class="text-3xl">⭐</p>
        <p class="text-xl font-extrabold text-amber-900 mt-1">130</p>
        <p class="text-xs text-amber-700/60 font-bold">XP today</p>
      </div>
      <div class="bg-white rounded-3xl p-4 min-w-[120px] shadow-md text-center">
        <p class="text-3xl">📚</p>
        <p class="text-xl font-extrabold text-amber-900 mt-1">248</p>
        <p class="text-xs text-amber-700/60 font-bold">words</p>
      </div>
    </div>

    <div class="bg-white rounded-3xl p-5 shadow-md mb-5">
      <div class="flex items-center gap-3 mb-3">
        <span class="text-2xl">💡</span>
        <p class="font-extrabold text-amber-900">Word of the day</p>
      </div>
      <p class="text-3xl font-extrabold text-orange-600">serendipity</p>
      <p class="text-amber-800/70 mt-1">finding something good without looking for it</p>
      <button class="mt-4 bg-amber-100 text-amber-800 font-bold px-4 py-2 rounded-xl">Add word</button>
    </div>

    <div class="bg-white rounded-3xl p-5 shadow-md">
      <p class="font-extrabold text-amber-900 mb-3">Mastery map 🗺️</p>
      <div class="h-4 rounded-full overflow-hidden flex">
        <div class="bg-stone-200" style="width:12%"></div>
        <div class="bg-orange-200" style="width:18%"></div>
        <div class="bg-orange-300" style="width:22%"></div>
        <div class="bg-amber-300" style="width:20%"></div>
        <div class="bg-yellow-300" style="width:18%"></div>
        <div class="bg-emerald-300" style="width:10%"></div>
      </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white px-6 py-3 flex justify-between text-xs font-bold text-amber-800/50" style="max-width:390px;margin:0 auto;border-radius:28px 28px 0 0;box-shadow:0 -4px 20px rgba(249,115,22,0.08);">
      <span class="text-orange-600">Learn</span>
      <span>Words</span>
      <span class="text-2xl -mt-6 bg-orange-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg">+</span>
      <span>Practice</span>
      <span>Settings</span>
    </nav>
  </div>
</body>
</html>
