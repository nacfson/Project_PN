worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Do not log query strings on auth routes (verification tokens).
    map $request_uri $auth_access_log {
        default 1;
        ~^/api/auth/ 0;
    }

    log_format auth_safe '$remote_addr - $remote_user [$time_local] '
                         '"$request_method $uri $server_protocol" '
                         '$status $body_bytes_sent "$http_referer" '
                         '"$http_user_agent"';

    access_log /var/log/nginx/access.log auth_safe if=$auth_access_log;

    upstream api {
        server api:8080;
    }

    # HTTP server — redirect all traffic to HTTPS.
    server {
        listen 80;
        server_name pn.nacfson.cloud _;

        location = /healthz {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /readyz {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server — serves the domain over TLS.
    server {
        listen 443 ssl;
        server_name pn.nacfson.cloud;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/web;
        index index.html;

        location = /healthz {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /readyz {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/api/auth/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $http_x_user_id;
            proxy_set_header X-User-Email $http_x_user_email;
            proxy_set_header X-User-Roles $http_x_user_roles;
            proxy_hide_header Referrer-Policy;
            proxy_hide_header Cache-Control;
            add_header Referrer-Policy "no-referrer" always;
            add_header Cache-Control "no-store" always;
        }

        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $http_x_user_id;
            proxy_set_header X-User-Email $http_x_user_email;
            proxy_set_header X-User-Roles $http_x_user_roles;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
