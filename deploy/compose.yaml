name: project_pn_staging

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: project_pn
      POSTGRES_USER: project_pn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_staging}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - project_pn_staging_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_pn -d project_pn"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    image: ${BACKEND_IMAGE:-project-pn-backend:latest}
    command: ["./migrate", "up"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MIGRATIONS_PATH: file://db/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ${BACKEND_IMAGE:-project-pn-backend:latest}
    environment:
      APP_ADDR: :8080
      DATABASE_URL: ${DATABASE_URL}
      MIGRATIONS_PATH: file://db/migrations
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENRICH_BASE_URL: ${ENRICH_BASE_URL:-}
      ENRICH_API_KEY: ${ENRICH_API_KEY:-}
      ENRICH_MODEL: ${ENRICH_MODEL:-}
      DEFAULT_TARGET_LANG: ${DEFAULT_TARGET_LANG:-en}
      DEFAULT_DEFINITION_LANG: ${DEFAULT_DEFINITION_LANG:-ko}
      ALLOWED_TARGET_LANGS: ${ALLOWED_TARGET_LANGS:-}
      ALLOWED_DEFINITION_LANGS: ${ALLOWED_DEFINITION_LANGS:-}
      FORCE_TARGET_LANG: ${FORCE_TARGET_LANG:-}
      FORCE_DEFINITION_LANG: ${FORCE_DEFINITION_LANG:-}
      SESSION_TTL: ${SESSION_TTL:-720h}
      REQUIRE_EMAIL_VERIFIED: ${REQUIRE_EMAIL_VERIFIED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-log}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost}
      MAGIC_LINK_TTL: ${MAGIC_LINK_TTL:-15m}
      EXCHANGE_CODE_TTL: ${EXCHANGE_CODE_TTL:-5m}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "53412:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  project_pn_staging_postgres:
